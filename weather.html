<!DOCTYPE html><html><head><title>Weather</title><link rel="stylesheet" href="style.css"></head>
<body><nav><a href="index.html">Home</a></nav><div class="container">
<h1>Weather Operations</h1><button onclick="getWeather()">Get My Weather</button>
<h2 id="temp">--°C</h2><p id="info"></p></div>
<script>
async function getWeather(){
navigator.geolocation.getCurrentPosition(async p=>{
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&current_weather=true`);
let d=await r.json();
temp.innerText=d.current_weather.temperature+'°C';
info.innerText='Wind: '+d.current_weather.windspeed+' km/h';
});
}
</script></body></html>
