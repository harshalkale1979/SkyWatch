<!doctype html><html><head><title>Weather</title><link rel='stylesheet' href='style.css'></head>
<body><nav><a href='index.html'>Home</a></nav><div class='container'>
<h2>Weather Operations</h2><div class='panel'><button onclick='getWeather()'>Get Current Weather</button>
<h1 id='temp'>--°C</h1><p id='info'>Click button to load local weather.</p></div></div>
<script>
async function getWeather(){
navigator.geolocation.getCurrentPosition(async p=>{
let u=`https://api.open-meteo.com/v1/forecast?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&current_weather=true`;
let d=await (await fetch(u)).json();
temp.innerText=d.current_weather.temperature+'°C';
info.innerText='Wind '+d.current_weather.windspeed+' km/h';
});
}
</script></body></html>
